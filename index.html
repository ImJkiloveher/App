<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Discipline Quest</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#111827,#1e293b);
  color:white;
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.title{
  text-align:center;
  font-size:3rem;
  font-weight:bold;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  opacity:0.8;
  margin-bottom:30px;
}

.top-bar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.card{
  background:#1f2937;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.card h2{
  font-size:1rem;
  opacity:0.8;
  margin-bottom:8px;
}

.big{
  font-size:2rem;
  font-weight:bold;
}

.xp-bar{
  width:100%;
  height:18px;
  background:#374151;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.xp-fill{
  height:100%;
  width:0%;
  background:linear-gradient(to right,#22c55e,#3b82f6);
  transition:0.3s;
}

.tasks{
  display:grid;
  gap:15px;
}

.task{
  background:#111827;
  padding:18px;
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:2px solid transparent;
  transition:0.2s;
}

.task.completed{
  border-color:#22c55e;
  opacity:0.7;
}

.task-info h3{
  margin-bottom:5px;
}

.task-info p{
  opacity:0.7;
  font-size:0.9rem;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.complete-btn{
  background:#22c55e;
  color:white;
}

.complete-btn:hover{
  transform:scale(1.05);
}

.complete-btn:disabled{
  background:gray;
  cursor:not-allowed;
}

.reward-box{
  margin-top:25px;
  text-align:center;
  padding:25px;
  border-radius:20px;
  background:#0f172a;
}

.reward{
  font-size:1.2rem;
  margin-top:10px;
  color:#facc15;
}

.footer{
  text-align:center;
  margin-top:30px;
  opacity:0.6;
  font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">

  <h1 class="title">⚔ Discipline Quest</h1>
  <p class="subtitle">Level up your real life.</p>

  <div class="top-bar">

    <div class="card">
      <h2>Level</h2>
      <div class="big" id="level">1</div>
    </div>

    <div class="card">
      <h2>Total XP</h2>
      <div class="big" id="xp">0</div>

      <div class="xp-bar">
        <div class="xp-fill" id="xpFill"></div>
      </div>
    </div>

    <div class="card">
      <h2>Streak 🔥</h2>
      <div class="big" id="streak">0</div>
    </div>

  </div>

  <div class="tasks" id="taskList"></div>

  <div class="reward-box">
    <h2>🏆 Current Rank</h2>
    <div class="reward" id="rank">Beginner</div>
  </div>

  <div class="footer">
    Complete tasks daily to become unstoppable.
  </div>

</div>

<script>

const tasks = [
  {
    name:"30 Pushups",
    desc:"Build strength and discipline",
    xp:25
  },
  {
    name:"Football Training",
    desc:"Improve your skills today",
    xp:40
  },
  {
    name:"Drink Water",
    desc:"Stay hydrated",
    xp:10
  },
  {
    name:"No Doomscrolling",
    desc:"Avoid wasting time online",
    xp:35
  },
  {
    name:"Sleep Before 11PM",
    desc:"Recover properly",
    xp:30
  }
];

let xp = localStorage.getItem("xp")
  ? parseInt(localStorage.getItem("xp"))
  : 0;

let streak = localStorage.getItem("streak")
  ? parseInt(localStorage.getItem("streak"))
  : 0;

let completed = JSON.parse(localStorage.getItem("completed")) || [];

function levelCalc(){
  return Math.floor(xp / 100) + 1;
}

function rankCalc(level){
  if(level >= 20) return "Legend";
  if(level >= 15) return "Elite";
  if(level >= 10) return "Warrior";
  if(level >= 5) return "Disciplined";
  return "Beginner";
}

function updateUI(){

  const level = levelCalc();

  document.getElementById("xp").textContent = xp;
  document.getElementById("level").textContent = level;
  document.getElementById("streak").textContent = streak;
  document.getElementById("rank").textContent = rankCalc(level);

  const progress = xp % 100;

  document.getElementById("xpFill").style.width =
    progress + "%";

  renderTasks();
}

function renderTasks(){

  const taskList = document.getElementById("taskList");

  taskList.innerHTML = "";

  tasks.forEach((task,index)=>{

    const done = completed.includes(index);

    const div = document.createElement("div");

    div.className = "task" + (done ? " completed" : "");

    div.innerHTML = `
      <div class="task-info">
        <h3>${task.name}</h3>
        <p>${task.desc}</p>
      </div>

      <button
        class="complete-btn"
        ${done ? "disabled" : ""}
        onclick="completeTask(${index})"
      >
        ${done ? "Done ✓" : "+" + task.xp + " XP"}
      </button>
    `;

    taskList.appendChild(div);

  });
}

function completeTask(index){

  if(completed.includes(index)) return;

  xp += tasks[index].xp;

  completed.push(index);

  streak++;

  localStorage.setItem("xp",xp);
  localStorage.setItem("streak",streak);
  localStorage.setItem(
    "completed",
    JSON.stringify(completed)
  );

  updateUI();
}

updateUI();

</script>

</body>
</html>
